<!DOCTYPE html>
<html>

<head>
    <script type="importmap">
        {
            "imports": {
                "codemirror": "https://esm.sh/*codemirror",
                "@codemirror/": "https://esm.sh/*@codemirror/",
                "crelt": "https://esm.sh/crelt",
                "@lezer/": "https://esm.sh/*@lezer/",
                "@marijn/": "https://esm.sh/@marijn/",
                "style-mod": "https://esm.sh/style-mod",
                "w3c-keyname": "https://esm.sh/w3c-keyname"
            }
        }
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .hidden {
            display: none;
        }

        html,
        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
        }

        body {
            padding: 10px 20px 0 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .aspect {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-aspect-ratio: 1/1) {
            .aspect {
                flex-direction: row;
            }
        }

        .data {
            flex: 1;
            min-height: 0;
            min-width: 0;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
        }

        .err {
            font-family: monospace;
            font-size: smaller;
            padding: 5px;
        }

        .cm-editor {
            flex: 1;
            min-height: 0;
            min-width: 0;
        }

        .cm-editor.hidden {
            /* the simple .hidden isn't enough to override CodeMirror's CSS */
            display: none !important;
        }

        .cm-scroller {
            overflow: auto;
        }

        #version {
            text-align: center;
            font-size: small;
            color: #eee;
        }
    </style>
</head>

<body>
    <div class="aspect">
        <div id="ours" class="data">
            <select id="mode">
                <option value="Neutered">Tindalwic - neutered</option>
                <option value="Compact">Tindalwic - compact</option>
                <option value="Verbose">Tindalwic - verbose</option>
            </select>
            <pre id="theirErr" class="err hidden"></pre>
        </div>
        <div id="theirs" class="data">
            <select id="format">
                <option value="JSON">JSON</option>
                <option value="TOML">TOML</option>
                <option value="YAML">YAML</option>
            </select>
            <pre id="ourErr" class="err hidden"></pre>
        </div>
    </div>
    <span id="version"></span>

    <script type="module">
        import init, { from_tindalwic, into_tindalwic, version } from './tindalwic_webapp.js';
        await init();
        document.getElementById("version").innerText = version();
        import { basicSetup } from "codemirror";
        import { EditorView, keymap } from "@codemirror/view";
        import { EditorState, Compartment } from "@codemirror/state";
        import { indentWithTab } from "@codemirror/commands";
        import { indentUnit, StreamLanguage } from "@codemirror/language";
        import { StateEffect } from "@codemirror/state";
        import { json } from "@codemirror/lang-json";
        import { yaml } from "@codemirror/lang-yaml";
        import { toml } from "@codemirror/legacy-modes/mode/toml";
        const ourDiv = document.getElementById('ours');
        const ourView = new EditorView({
            parent: ourDiv,
            extensions: [
                basicSetup,
                indentUnit.of("\t"),
                keymap.of([indentWithTab])
            ]
        });
        const theirDiv = document.getElementById('theirs');
        const languageConf = new Compartment();
        const languageExtensions = {
            JSON: json(),
            YAML: yaml(),
            TOML: StreamLanguage.define(toml)
        };
        const theirView = new EditorView({
            parent: theirDiv,
            extensions: [
                basicSetup,
                keymap.of([indentWithTab]),
                languageConf.of(languageExtensions.JSON)
            ]
        });
        let scrolling = false;
        function scroll() {
            if (scrolling) return; // avoid the rebound
            scrolling = true;
            const that = (this == ourView.scrollDOM) ? theirView.scrollDOM : ourView.scrollDOM;
            const thatVertical = (that.scrollHeight - that.clientHeight);
            const thisVertical = (this.scrollHeight - this.clientHeight) || 1;
            that.scrollTop = this.scrollTop * thatVertical / thisVertical;
            const thatHorizontal = (that.scrollWidth - that.clientWidth);
            const thisHorizontal = (this.scrollWidth - this.clientWidth) || 1;
            that.scrollLeft = this.scrollLeft * thatHorizontal / thisHorizontal;
            requestAnimationFrame(() => { scrolling = false; });
        }
        ourView.scrollDOM.addEventListener('scroll', scroll);
        theirView.scrollDOM.addEventListener('scroll', scroll);
        const ourErr = document.getElementById('ourErr');
        const theirErr = document.getElementById('theirErr');
        function reset() {
            ourView.dom.classList.remove('hidden');
            ourErr.classList.add('hidden');
            ourErr.textContent = '';
            theirView.dom.classList.remove('hidden');
            theirErr.classList.add('hidden');
            theirErr.textContent = '';
        }
        function oursToTheirs() {
            const input = ourView.state.doc.toString();
            const mode = document.getElementById('mode').value;
            const format = document.getElementById('format').value;
            let output;
            try {
                reset();
                output = from_tindalwic(input, mode, format);
            } catch (e) {
                theirView.dom.classList.add('hidden');
                ourErr.classList.remove('hidden');
                ourErr.textContent = e;
                return;
            }
            theirView.dispatch({
                changes: {
                    from: 0,
                    to: theirView.state.doc.length,
                    insert: output
                },
                effects: languageConf.reconfigure(languageExtensions[mode]),
                selection: { anchor: 0 }
            });
        }
        function theirsToOurs() {
            const input = theirView.state.doc.toString();
            const mode = document.getElementById('mode').value;
            const format = document.getElementById('format').value;
            let output;
            try {
                reset();
                output = into_tindalwic(input, mode, format);
            } catch (e) {
                ourView.dom.classList.add('hidden');
                theirErr.classList.remove('hidden');
                theirErr.textContent = e;
                return;
            }
            ourView.dispatch({
                changes: {
                    from: 0,
                    to: ourView.state.doc.length,
                    insert: output
                }
            });
        }
        ourView.dispatch({
            effects: StateEffect.appendConfig.of(EditorView.updateListener.of((update) => {
                if (update.view.hasFocus && update.docChanged) oursToTheirs();
            }))
        });
        theirView.dispatch({
            effects: StateEffect.appendConfig.of(EditorView.updateListener.of((update) => {
                if (update.view.hasFocus && update.docChanged) theirsToOurs();
            }))
        });
        document.getElementById('format').addEventListener('change', oursToTheirs);
        document.getElementById('mode').addEventListener('change', oursToTheirs);
    </script>

</body>

</html>
